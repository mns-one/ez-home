spring.config.import=optional:file:.env[.properties]

spring.application.name=device-registry-service
server.port=${DEVICE_REGISTRY_SERVICE_PORT}
#grpc.server.port=${GRPC_SERVER_PORT}

# postgres properties
spring.datasource.url=${DEVICE_REGISTRY_DB_URL}
spring.datasource.username=${DEVICE_REGISTRY_DB_USERNAME}
spring.datasource.password=${DEVICE_REGISTRY_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true