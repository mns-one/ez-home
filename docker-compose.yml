services:

  auth-db:
    image: postgres:17
    container_name: ${DOCKER_POSTGRES_AUTH_DB_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_AUTH_DB_NAME}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    volumes:
      - auth_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 1

    networks:
      - ezhomenet

  user-db:
    image: postgres:17
    container_name: ${DOCKER_POSTGRES_USER_DB_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_USER_DB_NAME}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    volumes:
      - user_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-userdb}"]
      interval: 10s
      timeout: 5s
      retries: 1

    networks:
      - ezhomenet

  device-registry-db:
    image: postgres:17
    container_name: ${DOCKER_POSTGRES_DEVICE_REGISTRY_DB_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_DEVICE_REGISTRY_DB_NAME}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    volumes:
      - device_registry_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-deviceregistrydb}"]
      interval: 10s
      timeout: 5s
      retries: 1

    networks:
      - ezhomenet

  device-db:
    image: postgres:17
    container_name: ${DOCKER_POSTGRES_DEVICE_DB_CONTAINER_NAME}
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_DEVICE_DB_NAME}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    volumes:
      - device_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-devicedb}"]
      interval: 10s
      timeout: 5s
      retries: 1

    networks:
      - ezhomenet

  ingestion-redis:
      image: redis:7-alpine
      container_name: ${DOCKER_INGESTION_REDIS_CONTAINER_NAME}
      restart: unless-stopped

      volumes:
        - ingestion_redis_data:/data

      healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 1

      networks:
        - ezhomenet

  user-app:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ${DOCKER_USER_SERVICE_CONTAINER_NAME}
    restart: on-failure:1  

    depends_on:
      user-db:
        condition: service_healthy

    environment:
      USER_SERVICE_PORT: ${DOCKER_USER_SERVICE_PORT}
      GRPC_SERVER_PORT: ${DOCKER_USER_SERVICE_GRPC_PORT}
      USER_DB_URL: ${DOCKER_POSTGRES_USER_DB_URL}
      USER_DB_USERNAME: ${DOCKER_POSTGRES_USER}
      USER_DB_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    networks:
      - ezhomenet

  auth-app:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ${DOCKER_AUTH_SERVICE_CONTAINER_NAME}
    restart: on-failure:1

    depends_on:
      auth-db:
        condition: service_healthy

    environment:
      AUTH_SERVICE_PORT: ${DOCKER_AUTH_SERVICE_PORT}
      GRPC_SERVER_PORT: ${DOCKER_AUTH_SERVICE_GRPC_PORT}
      USER_DB_URL: ${DOCKER_POSTGRES_AUTH_DB_URL}
      USER_DB_USERNAME: ${DOCKER_POSTGRES_USER}
      USER_DB_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_ADDRESS: ${DOCKER_USER_SERVICE_CONTAINER_NAME}
      USER_SERVICE_GRPC_PORT: ${DOCKER_USER_SERVICE_GRPC_PORT}

    networks:
      - ezhomenet

  device-registry-app:
    build:
      context: ./device-registry-service
      dockerfile: Dockerfile
    container_name: ${DOCKER_DEVICE_REGISTRY_SERVICE_CONTAINER_NAME}
    restart: on-failure:1  

    depends_on:
      device-registry-db:
        condition: service_healthy

    environment:
      DEVICE_REGISTRY_SERVICE_PORT: ${DOCKER_DEVICE_REGISTRY_SERVICE_PORT}
      DEVICE_REGISTRY_GRPC_SERVER_PORT: ${DOCKER_DEVICE_REGISTRY_SERVICE_GRPC_PORT}
      DEVICE_REGISTRY_DB_URL: ${DOCKER_POSTGRES_DEVICE_REGISTRY_DB_URL}
      DEVICE_REGISTRY_DB_USERNAME: ${DOCKER_POSTGRES_USER}
      DEVICE_REGISTRY_DB_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}

    networks:
      - ezhomenet

  device-app:
    build:
      context: ./device-service
      dockerfile: Dockerfile
    container_name: ${DOCKER_DEVICE_SERVICE_CONTAINER_NAME}
    restart: on-failure:1  

    depends_on:
      device-db:
        condition: service_healthy

    environment:
      DEVICE_SERVICE_PORT: ${DOCKER_DEVICE_SERVICE_PORT}
      DEVICE_SERVICE_GRPC_SERVER_PORT: ${DOCKER_DEVICE_SERVICE_GRPC_PORT}
      DEVICE_SERVICE_DB_URL: ${DOCKER_POSTGRES_DEVICE_DB_URL}
      DEVICE_SERVICE_DB_USERNAME: ${DOCKER_POSTGRES_USER}
      DEVICE_SERVICE_DB_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}
      DEVICE_REGISTRY_SERVICE_ADDRESS: ${DOCKER_DEVICE_REGISTRY_SERVICE_CONTAINER_NAME}
      DEVICE_REGISTRY_SERVICE_GRPC_SERVER_PORT: ${DOCKER_DEVICE_REGISTRY_SERVICE_GRPC_PORT}

    networks:
      - ezhomenet

  ingestion-app:
    build:
      context: ./ingestion-service
      dockerfile: Dockerfile
    container_name: ${DOCKER_INGESTION_SERVICE_CONTAINER_NAME}
    restart: on-failure:1  

    depends_on:
      ingestion-redis:
        condition: service_healthy

    environment:
      INGESTION_SERVICE_PORT: ${DOCKER_INGESTION_SERVICE_PORT}
      INGESTION_SERVICE_GRPC_SERVER_PORT: ${DOCKER_INGESTION_SERVICE_GRPC_PORT}
      INGESTION_SERVICE_REDIS_HOST: ${DOCKER_INGESTION_REDIS_CONTAINER_NAME}
      INGESTION_SERVICE_REDIS_PORT: ${DOCKER_INGESTION_SERVICE_REDIS_PORT}
      DEVICE_SERVICE_ADDRESS: ${DOCKER_DEVICE_SERVICE_CONTAINER_NAME}
      DEVICE_SERVICE_GRPC_SERVER_PORT: ${DOCKER_DEVICE_SERVICE_GRPC_PORT}

    networks:
      - ezhomenet

  app:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: on-failure:1

    environment:
      API_GATEWAY_SERVICE_PORT: ${DOCKER_API_GATEWAY_PORT}
      API_GATEWAY_AUTH_URL: ${DOCKER_API_GATEWAY_AUTH_URL}
      JWT.SECRET: ${JWT_SECRET}

      AUTH_SERVICE_CONTAINER_NAME: ${DOCKER_AUTH_SERVICE_CONTAINER_NAME}
      AUTH_SERVICE_PORT: ${DOCKER_AUTH_SERVICE_PORT}

      USER_SERVICE_CONTAINER_NAME: ${DOCKER_USER_SERVICE_CONTAINER_NAME}
      USER_SERVICE_PORT: ${DOCKER_USER_SERVICE_PORT}

      DEVICE_REGISTRY_SERVICE_CONTAINER_NAME: ${DOCKER_DEVICE_REGISTRY_SERVICE_CONTAINER_NAME}
      DEVICE_REGISTRY_SERVICE_PORT: ${DOCKER_DEVICE_REGISTRY_SERVICE_PORT}

      DEVICE_SERVICE_CONTAINER_NAME: ${DOCKER_DEVICE_SERVICE_CONTAINER_NAME}
      DEVICE_SERVICE_PORT: ${DOCKER_DEVICE_SERVICE_PORT}

      INGESTION_SERVICE_CONTAINER_NAME: ${DOCKER_INGESTION_SERVICE_CONTAINER_NAME}
      INGESTION_SERVICE_PORT: ${DOCKER_INGESTION_SERVICE_PORT}

    ports:
      - "4000:4000"
      
    networks:
      - ezhomenet

networks:
  ezhomenet:

volumes:
  user_data:
  auth_data:
  device_registry_data:
  device_data:
  ingestion_redis_data:

