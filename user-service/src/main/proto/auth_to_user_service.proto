syntax = "proto3";

import "google/protobuf/empty.proto";

option java_multiple_files = true;
option java_package = "user";

service UserService {
    rpc pollUserService(pollRequest) returns (pollResponse);
    rpc CreateUserAccount(CreateUserAccountRequest) returns (CreateUserAccountResponse);
    rpc DeleteUserAccount(DeleteUserAccountRequest) returns (google.protobuf.Empty);
}

message pollRequest {
    string message = 1;
}

message pollResponse {
    string message = 1;
}

message CreateUserAccountRequest {
    string username = 1;
    string email = 2;
}

message CreateUserAccountResponse {
    string id = 1;
    string username = 2;
    string email = 3;
    string createdAt = 4;
}

message DeleteUserAccountRequest {
    string id = 1;
}
