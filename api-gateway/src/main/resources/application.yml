server:
  port: ${GATEWAY_SERVICE_PORT}

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
             # Route for /auth/** to auth-service
            - id: auth-service-route
              uri: http://${AUTH_SERVICE_CONTAINER_NAME}:${AUTH_SERVICE_PORT}
              predicates:
                - Path=/auth/**

            # Route for /users/** to user-service
            - id: user-service-route
              uri: http://${USER_SERVICE_CONTAINER_NAME}:${USER_SERVICE_PORT}
              predicates:
                - Path=/user/**
              filters:
                - JwtValidation

            # Route for /registry/** to device-registry-service
            - id: device-registry-service-route
              uri: http://${DEVICE_REGISTRY_SERVICE_CONTAINER_NAME}:${DEVICE_REGISTRY_SERVICE_PORT}
              predicates:
                - Path=/registry/**
              filters:
                - JwtValidation

            # Route for /device/** to device-service
            - id: device-service-route
              uri: http://${DEVICE_SERVICE_CONTAINER_NAME}:${DEVICE_SERVICE_PORT}
              predicates:
                - Path=/device/**
              filters:
                - JwtValidation    


