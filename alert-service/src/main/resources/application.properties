spring.config.import=optional:file:.env[.properties]

spring.application.name=alert-service

server.port=${ALERT_SERVICE_PORT}
grpc.server.port=${ALERT_SERVICE_GRPC_SERVER_PORT}

spring.data.redis.host=${ALERT_SERVICE_REDIS_HOST}
spring.data.redis.port=${ALERT_SERVICE_REDIS_PORT}

device.service.address=${DEVICE_SERVICE_ADDRESS}
device.service.grpc.port=${DEVICE_SERVICE_GRPC_SERVER_PORT}

# kafk

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.ezhome.alertservice.event.UsageEvent

# postgres properties
spring.datasource.url=${ALERT_SERVICE_DB_URL}
spring.datasource.username=${ALERT_SERVICE_DB_USERNAME}
spring.datasource.password=${ALERT_SERVICE_DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
